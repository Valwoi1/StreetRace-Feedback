name: Bug Report
description: Fehler oder kaputte Funktion in StreetRace melden
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Danke. Bitte so genau wie möglich ausfüllen, damit der Fehler schnell reproduzierbar ist.

  - type: dropdown
    id: area
    attributes:
      label: Bereich
      description: Wo tritt der Fehler auf?
      options:
        - Map / Karte
        - Live GPS / Tracking
        - Runs / Start-Ziel-Logik
        - Leaderboard
        - Route Recording
        - Profile / Login
        - POIs / Blitzer / Meldungen
        - iPhone Home-Screen App
        - Android
        - Desktop / Browser
        - Sonstiges
    validations:
      required: true

  - type: textarea
    id: bug_description
    attributes:
      label: Fehlerbeschreibung
      description: Was ist kaputt oder verhält sich falsch?
      placeholder: Z. B. Profilseite zeigt nur einen schwarzen Screen.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Schritte zum Reproduzieren
      description: Bitte Schritt für Schritt.
      placeholder: |
        1. App öffnen
        2. Auf Profil tippen
        3. ...
        4. Fehler sehen
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Erwartetes Verhalten
      placeholder: Was hätte eigentlich passieren sollen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Tatsächliches Verhalten
      placeholder: Was passiert stattdessen?
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Priorität / Schwere
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App-Version / Stand
      description: Falls bekannt, z. B. Version, Commit oder "neueste Render-Version"
      placeholder: z. B. latest Render deploy
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Plattform
      options:
        - iPhone
        - Android
        - Desktop
        - Mehrere
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / Modus
      description: z. B. Safari, Chrome, iPhone Home-Screen App
      placeholder: z. B. Safari Home-Screen App
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Videos / Zusatzinfos
      description: Hier Links, Screenshots oder weitere Hinweise einfügen
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Vor dem Absenden
      options:
        - label: Ich habe geprüft, ob es dafür schon ein ähnliches Issue gibt
          required: true
        - label: Ich habe die Schritte so genau wie möglich beschrieben
          required: true
