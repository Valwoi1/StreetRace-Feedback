name: Feature Request
description: Neue Funktion für StreetRace vorschlagen
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Neue Features bitte möglichst konkret beschreiben. Nicht nur "wäre cool", sondern was genau, warum und wie es benutzt werden soll.

  - type: dropdown
    id: area
    attributes:
      label: Bereich
      options:
        - Map / Karte
        - Live GPS / Tracking
        - Runs / Start-Ziel-Logik
        - Leaderboard
        - Route Recording
        - Profile / Login
        - POIs / Blitzer / Meldungen
        - Fahrzeuge / Kategorien
        - Replay / Run-Visualisierung
        - Sonstiges
    validations:
      required: true

  - type: input
    id: summary
    attributes:
      label: Kurzbeschreibung
      placeholder: z. B. Leaderboard-Einträge anklickbar machen
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Welches Problem löst das?
      description: Warum braucht man diese Funktion?
      placeholder: z. B. Man sieht aktuell nur Zeiten, aber nicht wie der Run tatsächlich gefahren wurde.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Gewünschte Lösung
      description: So konkret wie möglich
      placeholder: |
        Beispiel:
        - Klick auf Leaderboard-Eintrag
        - Route öffnet sich auf der Karte
        - Linie ist nach Geschwindigkeit eingefärbt
        - Legende wird eingeblendet
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Lösungen
      placeholder: Gibt es eine einfachere oder abgespeckte Variante?
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Wichtigkeit
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Aufwand (geschätzt aus Nutzersicht)
      options:
        - Klein
        - Mittel
        - Groß
        - Keine Ahnung
    validations:
      required: false

  - type: textarea
    id: examples
    attributes:
      label: Beispiele / Mockup / Referenzen
      placeholder: Vergleich mit anderer App, Screenshot, Skizze oder genaue Idee
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Vor dem Absenden
      options:
        - label: Ich habe geprüft, ob es dieses Feature schon als Issue gibt
          required: true
