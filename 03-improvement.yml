name: Verbesserung / UI / UX
description: Bestehende Funktion verbessern, ohne komplett neues Feature
title: "[Improvement] "
labels: ["improvement"]
body:
  - type: markdown
    attributes:
      value: |
        Diese Vorlage ist für kleinere Verbesserungen, UI-Feinschliff, bessere Texte, bessere Abläufe oder Optimierungen.

  - type: dropdown
    id: area
    attributes:
      label: Bereich
      options:
        - Map / Karte
        - Live GPS / Tracking
        - Runs / Start-Ziel-Logik
        - Leaderboard
        - Route Recording
        - Profile / Login
        - POIs / Blitzer / Meldungen
        - UI / Design
        - Performance
        - Sonstiges
    validations:
      required: true

  - type: textarea
    id: current_state
    attributes:
      label: Was ist aktuell nicht optimal?
      placeholder: z. B. Unten ist zu viel Abstand oder ein Button sitzt ungünstig.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Verbesserungsvorschlag
      placeholder: Was genau sollte besser werden?
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Einfluss
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Zusätzliche Infos
      placeholder: Screenshots, Beispiele, Geräteinfos, genaue Stelle in der App
    validations:
      required: false
